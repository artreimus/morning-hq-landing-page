<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <style>
    .sun { fill: #e8926a; }
    .horizon { fill: #1a152e; }
    @media (prefers-color-scheme: dark) {
      .horizon { fill: #fdf8f2; }
    }
  </style>

  <g transform="translate(0, 10)">
    <!-- The Rising Sun (Semi-circle) -->
    <path class="sun" d="M 22 60 A 38 38 0 0 1 98 60 Z" />
    
    <!-- Crisp Horizon Line -->
    <rect class="horizon" x="14" y="66" width="92" height="7" rx="3.5" />
    
    <!-- Subtle Geometric Reflection -->
    <rect class="horizon" x="38" y="80" width="44" height="4" rx="2" opacity="0.6" />
  </g>
</svg>
